<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Socket.io Demo</title>
</head>

<body>
    <h1>Socket.IO</h1>

    <!-- here we are importing socket.io client side javaScript -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- here we are instantiating socket.io -->
    <script type="module">
        const socket = io();    // here we instantiated

        // now we will make connection with socket.io from frontend or client side
        socket.on("connect", () => {
            console.log("Connected to (client) ✅");    // this will be visible on console of browser

            // here we are calling the disconnect
            // Disconnect from server after 5 second
            setTimeout(() => {
                socket.disconnect();
            }, 5000);
        })

        // Trigger when disconnected
        socket.on("disconnect", () => console.log("Disconnected from (client) ❌"))

        // Receving data from server/backend
        // message name -> "message" should be same while sending and receiving the message
        socket.on("message", (message) => console.log(message))

        // Sending message from client to server
        socket.emit("new message", "This is the new message sent from (client)")

    </script>
</body>

</html>
