_self: target.html opens within the iframe itself.

_top: Also replaces the entire window, including all frames — just like _parent, but even if nested deeper, it’ll always go to the topmost level. -->

                this frame (_self)</a></p>
        <p><a href="/My Notes/3. DOM/Starter/5. Getting and Setting Attributes/coding/index.html" target="_parent">Open
                in parent (_parent)</a></p>
        <p><a href="/My Notes/3. DOM/Starter/5. Getting and Setting Attributes/coding/index.html" target="_top">Open in
