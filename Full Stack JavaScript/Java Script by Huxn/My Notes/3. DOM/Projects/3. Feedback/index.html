<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Page</title>
    <link rel="stylesheet" href="/My Notes/3. DOM/Projects/3. Feedback/style.css" />
</head>

<body>
    <section class="panel-container" id="panel">
        <Strong>Your Feedback 👀</Strong>
        <div class="ratings-container">
            <div class="container">
                <div class="rating">
                    <div class="icon">😒</div>
                    <small>Unhappy</small>
                </div>
                <div class="rating">
                    <div class="icon">😐</div>
                    <small>Neutral</small>
                </div>
                <div class="rating">
                    <div class="icon">😊</div>
                    <small>Satisfied</small>
                </div>
            </div>
        </div>
        <button class="btn" id="send">Send Feedback</button>
    </section>
    <script src="/My Notes/3. DOM/Projects/3. Feedback/app.js"></script>
</body>

</html>
